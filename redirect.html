<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	
	<script>	
	function getFmpUrl() {
			const fmServer = "mac.nesredna.com"   // if FMP and the web server are on different machines, this should point to fmServer
			let newPath = location.search.slice(1);
			return "fmp://" + fmServer + "/" + newPath;
	}
	</script>
	<title>FMP Redirect</title>
</head>

<body>

	<h1>Redirecting…</h1>

	<p>If you are not automatically redirected, <a id="manual-link" href="#">click here to open in FileMaker</a>.</p>

    <script>
		const targetUrl = getFmpUrl();
		document.getElementsById('manual-link').href = targetUrl;
		window.location.href = targetUrl;
    </script>
    
</body>

</html>
